<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOT DE PASSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="absolute inset-0 bg-[#494C4F] flex flex-col justify-center items-center">
        <img src="../images/__before.png" alt="Photo"
            class="absolute inset-0 w-full h-full h-screen object-cover opacity-20">
        <div class="flex flex-col justify-center items-center z-20">
            <div class="flex gap-4 justify-center">
                <img src="../images/Link → SVG.png" alt="photo">
                <h1 class="text-white">RED PRODUCT</h1>
            </div>
            <br />
            <div class="bg-[#FFFFFF] w-80 h-80 ">
                <br />
                <h3 class="text-center">Mot de passe oublié?</h3>
                <br />
                <P class="pl-4">
                    Entrez votre adresse e-mail ci-dessous et nous vous envoyons des instuctions sur la façon de
                    modifier
                    votre mot de passe.
                </P>
                <br />
                <form action="">
                    <label for="" class="pl-4 text-[#494C4F] ">Votre e-mail</label>
                    <input type="email" required class="ml-4 h-10 w-[90%] border-b-2">
                    <br />
                    <br />
                    <button class="mx-4 h-10 rounded-lg bg-[#494C4F] w-[90%]">
                        <p class="text-white">Envoyer</p>
                    </button>
                </form>
            </div>
            <br />
            <h5 class="signOrLog flex gap-2">
                <p class="text-white">Revenir à la </p><a href="connexion.html" class="con">
                    <p class="text-[#FFD964]">Connexion</p>
                </a>
            </h5>
        </div>
    </div>
</body>

</html>
