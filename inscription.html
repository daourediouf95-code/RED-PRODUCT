<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSCRIPTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <!-- Background -->
    <div class="absolute inset-0 bg-[#494C4F] flex flex-col justify-center items-center">
        <img src="../images/__before.png" alt="Photo"
            class="absolute inset-0 w-full h-full h-screen object-cover opacity-20">
        <div class="flex flex-col justify-center items-center z-20">
            <div class="flex gap-4 justify-center">
                <img src="../images/Link → SVG.png" alt="photo">
                <h1 class="text-white">RED PRODUCT</h1>
            </div>
            <br />
            <div class="bg-[#FFFFFF] w-80 h-96 ">
                <br />
                <h3 class="text-center">Inscrivez-vous en tant que Admin</h3>
                <br />
                <form action="">
                    <input type="text" placeholder="Nom" required class="ml-4 h-10 w-[90%] border-b-2">
                    <br />
                    <br />
                    <input type="email" placeholder="E-mail" required class="ml-4 h-10 w-[90%] border-b-2">
                    <br />
                    <br />
                    <input type="password" placeholder="Mot de passe" required class="ml-4 h-10 w-[90%] border-b-2">
                    <br />
                    <br />
                    <div class="flex pl-4 gap-2">
                        <input type="checkbox">
                        <h3>Accepter les termes de la politique</h3>
                    </div>
                    <br />
                    <button class="mx-4 h-10 rounded-lg bg-[#494C4F] w-[90%]">
                        <p class="text-white ">S'inscrire</p>
                    </button>
                </form>
            </div>
            <br />
            <h5 class="signOrLog flex gap-2">
                <p class="text-white">Vous avez un compte? </p><a href="connexion.html" class="con">
                    <p class="text-[#FFD964]">Se connecter</p>
                </a>
            </h5>
        </div>
    </div>
</body>

</html>
